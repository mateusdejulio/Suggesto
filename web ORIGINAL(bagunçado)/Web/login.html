<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggesto - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo-area">
                <img src="imagens/logo.png" alt="Suggesto">
                <h2 class="titulo">Bem-vindo de volta</h2>
            </div>

            <div class="form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="senha" placeholder="Senha">

                <button onclick="entrarSuggesto()">Entrar</button>
            </div>

            <div class="extras">
                <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>

    <div class="toast-erro" id="toastErro">
        <span id="toastMsgErro">Mensagem de erro aqui</span>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
