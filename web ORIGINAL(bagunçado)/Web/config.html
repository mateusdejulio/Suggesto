<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <title>Config - Cliente</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/config.css">
</head>
<body>

    <div class="containerConfig">
        <header class="header-config">
            <i class="bi bi-chevron-left" onclick="voltarPerfil()"></i>
            <h1>Configurações</h1>
        </header>

        <div class="secoes-wrapper">
            <!-- Seção Suggesto -->
            <section class="secaoConfig">
                <h2 class="titulo-secao">Suggesto</h2>
                <div class="card-config">
                    <div class="item-config" onclick="irPara('faq')">
                        <div class="left"><i class="bi bi-question-circle"></i> Perguntas Frequentes</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                    <div class="item-config" onclick="irPara('contato')">
                        <div class="left"><i class="bi bi-envelope"></i> Entre em contato</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                    <div class="item-config border-0" onclick="irPara('sobre')">
                        <div class="left"><i class="bi bi-info-circle"></i> Sobre</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                </div>
            </section>

            <!-- Seção Conta -->
            <section class="secaoConfig">
                <h2 class="titulo-secao">Conta</h2>
                <div class="card-config">
                    <div class="item-config">
                        <div class="left"><i class="bi bi-globe"></i> País: Brasil</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                    <div class="item-config" onclick="sair()">
                        <div class="left"><i class="bi bi-box-arrow-right"></i> Sair</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                    <div class="item-config border-0 text-danger" onclick="excluirConta()">
                        <div class="left"><i class="bi bi-trash3"></i> Excluir Conta</div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="js/config.js"></script>
</body>
</html>
