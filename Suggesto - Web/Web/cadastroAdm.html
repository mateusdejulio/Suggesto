<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link rel="icon" type="image/png" href="imagens/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggesto - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>
  <div class="cadastro-page">
    <div class="cadastro-card">
      <div class="logo-area">
        <h2 class="titulo">Cadastre-se</h2>
      </div>

      <div class="form">
    <p id="planoSelecionado" class="plano-selecionado" style="display:none;"></p>
    <input type="text" id="nomeCompleto" placeholder="Nome completo">
    <input type="text" id="usuario" placeholder="Nome de Usuário">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">

    <div id="campos-admin">

      <select id="cargo" class="input-select" required>
        <option value="" disabled selected>Selecione seu Cargo</option>
        <option value="Dono">Dono</option>
        <option value="Gerente">Gerente</option>
        <option value="Supervisor">Supervisor</option>
        <option value="Operacional">Operacional</option>
    </select>

        <div class="ladoalado">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="tel" id="telefone" placeholder="Telefone">
        </div>
        <input type="text" id="cidade" placeholder="Cidade">
    </div>

    <button onclick="cadastrar()">Cadastrar</button>
</div>
    </div>
  </div>

  <div class="toast-erro" id="toastErro">
        <span id="toastMsgErro">Mensagem de erro aqui</span>
    </div>

  <script src="js/cadastro.js" defer></script>
</body>

</html>
